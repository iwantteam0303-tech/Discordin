<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>라임의 sha-256 멀티코어 계산기</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 20px; background-color: #313338; color: #dbdee1; display: flex; justify-content: center; margin-top: 50px; }
        .container { max-width: 400px; width: 100%; background-color: #2b2d31; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        h2 { text-align: center; color: #ffffff; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-size: 14px; font-weight: bold; color: #b5bac1; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 12px; margin-top: 8px; box-sizing: border-box; border-radius: 6px; border: none; background-color: #1e1f22; color: white; outline: none; font-size: 14px; }
        input[type="text"]:focus, input[type="number"]:focus, select:focus { border: 1px solid #5865F2; }
        
        /* 옵션 레이아웃 */
        .option-row { display: flex; gap: 10px; margin-top: 15px; }
        .option-item { flex: 1; }
        .option-item label { margin-top: 0; }

        .checkbox-group { display: flex; align-items: center; margin-top: 15px; background-color: #1e1f22; padding: 12px; border-radius: 6px; cursor: pointer; }
        .checkbox-group input [type="checkbox"] { margin: 0 10px 0 0; width: 16px; height: 16px; cursor: pointer; }
        .checkbox-group label { margin: 0; font-weight: normal; cursor: pointer; color: #dbdee1; }

        button { width: 100%; padding: 14px; margin-top: 25px; box-sizing: border-box; border-radius: 6px; border: none; background-color: #5865F2; color: white; cursor: pointer; font-size: 16px; font-weight: bold; transition: background-color 0.2s; }
        button:hover { background-color: #4752C4; }
        button:disabled { background-color: #4f545c; cursor: not-allowed; }
        
        #stopBtn { background-color: #da373c; display: none; margin-top: 10px; }
        #stopBtn:hover { background-color: #c92b30; }

        #status { margin-top: 15px; font-size: 13px; color: #faa61a; text-align: center; line-height: 1.4; }
        #result-box { margin-top: 20px; padding: 15px; background-color: #1e1f22; border-radius: 6px; display: none; word-break: break-all; max-height: 250px; overflow-y: auto; }
        
        .result-item { background: #2b2d31; padding: 10px; border-radius: 4px; margin-bottom: 8px; border-left: 4px solid #23a559; }
        .result-item:last-child { margin-bottom: 0; }
        .pw-text { color: #ffffff; font-weight: bold; font-size: 15px; }
        .hash-text { color: #949ba4; font-size: 12px; display: block; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>라임의 SHA-256 계산기</h2>
        
        <label>문제 내용 (Seed)</label>
        <input type="text" id="seed" value="1234567890" placeholder="기준 숫자를 입력하세요">
        
        <div class="option-row">
            <div class="option-item">
                <label>시작 0 개수</label>
                <input type="number" id="zeros" value="5" min="1" max="10">
            </div>
            <div class="option-item">
                <label>코어(스레드) 개수</label>
                <select id="cores"></select>
            </div>
        </div>

        <label class="checkbox-group">
            <input type="checkbox" id="stopOnMatch" checked style="margin-right: 8px;">
            <label for="stopOnMatch">발견 시 중지</label>
        </label>

        <button id="startBtn" onclick="startMining()">계산 시작</button>
        <button id="stopBtn" onclick="stopMining()">계산 중지</button>
        
        <div id="status"></div>
        
        <div id="result-box">
            <div id="result-content"></div>
        </div>
    </div>

    <script>
        // 현재 기기의 최대 논리 코어 수 확인 및 셀렉트 박스 동적 생성
        const maxCores = navigator.hardwareConcurrency || 4;
        const coreSelect = document.getElementById('cores');
        for (let i = 1; i <= maxCores; i++) {
            const opt = document.createElement('option');
            opt.value = i;
            opt.innerText = i === 1 ? `1 (기본값)` : `${i} 코어 (최대 속도)`;
            if (i === 1) opt.selected = true;
            coreSelect.appendChild(opt);
        }

        let workers = [];
        let isMining = false;
        let totalChecked = 0n;
        let statusInterval;

        // 백그라운드에서 동작할 일꾼(Worker) 내부 소스코드 (인라인 Blob 형태)
        const workerCode = `
            self.importScripts('https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js');
            
            self.onmessage = function(e) {
                const { seedStr, prefix, startPw, step, chunkSize } = e.data;
                const seed = BigInt(seedStr);
                let currentStart = BigInt(startPw);
                const chunk = BigInt(chunkSize);
                const workerStep = BigInt(step);

                while (true) {
                    for (let i = 0n; i < chunk; i++) {
                        const currentPw = currentStart + (i * workerStep);
                        const targetString = (seed * currentPw).toString();
                        const hash = CryptoJS.SHA256(targetString).toString(CryptoJS.enc.Hex);

                        if (hash.startsWith(prefix)) {
                            self.postMessage({ type: 'match', password: currentPw.toString(), hash: hash });
                        }
                    }
                    currentStart += chunk * workerStep;
                    self.postMessage({ type: 'progress', checked: chunk });
                }
            };
        `;

        function startMining() {
            if (isMining) return;

            const seedStr = document.getElementById('seed').value.trim();
            const zeros = parseInt(document.getElementById('zeros').value);
            const prefix = "0".repeat(zeros);
            const coreCount = parseInt(coreSelect.value);
            const stopOnMatch = document.getElementById('stopOnMatch').checked;

            const statusEl = document.getElementById('status');
            const resultBox = document.getElementById('result-box');
            const resultContent = document.getElementById('result-content');
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');

            // 유효성 검사
            try { BigInt(seedStr); } catch (e) { alert("올바른 숫자를 입력하세요."); return; }

            resultContent.innerHTML = '';
            resultBox.style.display = 'block';
            startBtn.style.display = 'none';
            stopBtn.style.display = 'block';
            
            isMining = true;
            totalChecked = 0n;

            // 워커 생성을 위한 Blob 주소 준비
            const blob = new Blob([workerCode], { type: 'application/javascript' });
            const workerUrl = URL.createObjectURL(blob);

            workers = [];
            const chunkSize = 2000n; // 주기가 너무 길면 반응이 느리므로 멀티코어용 최적화 크기

            statusEl.innerText = `${coreCount}개의 코어로 해시 연산을 분산 가동합니다...`;

            // 설정한 코어 개수만큼 워커 생성 및 연산 분배
            for (let i = 0; i < coreCount; i++) {
                const worker = new Worker(workerUrl);
                
                worker.onmessage = function(msg) {
                    if (msg.data.type === 'match') {
                        const item = document.createElement('div');
                        item.className = 'result-item';
                        item.innerHTML = `<span class="pw-text">Password: ${msg.data.password}</span><span class="hash-text">${msg.data.hash}</span>`;
                        resultContent.appendChild(item);
                        resultBox.scrollTop = resultBox.scrollHeight;

                        if (stopOnMatch) {
                            stopMining();
                            statusEl.innerText = "조건에 부합하는 값을 찾아 연산을 종료했습니다.";
                        }
                    } else if (msg.data.type === 'progress') {
                        totalChecked += BigInt(msg.data.checked);
                    }
                };

                // 각 코어마다 시작 Password를 다르게 지정하여 연산이 겹치지 않게 분배
                // 예: 4코어일 때 -> 코어0(0,4,8..), 코어1(1,5,9..), 코어2(2,6,10..), 코어3(3,7,11..)
                worker.postMessage({
                    seedStr: seedStr,
                    prefix: prefix,
                    startPw: i.toString(),
                    step: coreCount,
                    chunkSize: chunkSize.toString()
                });

                workers.push(worker);
            }

            // 주기적으로 현재까지 대략 몇 개나 검사했는지 UI에 표시
            statusInterval = setInterval(() => {
                statusEl.innerText = `🔥 멀티코어 가동 중 (${coreCount} Cores)\n현재까지 약 ${totalChecked.toLocaleString()}개 연산 시도 완료`;
            }, 500);
        }

        function stopMining() {
            clearInterval(statusInterval);
            workers.forEach(w => w.terminate());
            workers = [];
            
            isMining = false;
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('stopBtn').style.display = 'none';
            if (!document.getElementById('status').innerText.includes("찾아")) {
                document.getElementById('status').innerText = "사용자에 의해 연산이 중지되었습니다.";
            }
        }
    </script>
</body>
</html>
